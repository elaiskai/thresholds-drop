    <circle cx="6.9" cy="7.8" r="0.13" fill="#7a5d2c" opacity="0.18"/>
  </pattern>

  <pattern id="oxbloodGrain" patternUnits="userSpaceOnUse" width="9" height="9">
    <circle cx="1.7" cy="2.1" r="0.20" fill="#1a0606" opacity="0.5"/>
    <circle cx="5.4" cy="4.3" r="0.14" fill="#000" opacity="0.4"/>
