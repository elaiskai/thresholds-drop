<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="90mm" height="90mm" viewBox="0 0 90 90">

<defs>
  <style>
    .cut    { fill: none; stroke: #000; stroke-width: 0.35; }
    .fold   { fill: none; stroke: #C8262E; stroke-width: 0.3; stroke-dasharray: 3 1.5; }
    .glue   { fill: none; stroke: #1C4B82; stroke-width: 0.3; stroke-dasharray: 1.5 1.5; }
    .bleed  { fill: none; stroke: #888; stroke-width: 0.2; stroke-dasharray: 1 1; }
    .reg    { fill: none; stroke: #000; stroke-width: 0.25; }
    .annot  { font-family: 'Manrope', 'Inter', 'Helvetica Neue', sans-serif; font-size: 2.6px; fill: #444; }
    .h1     { font-family: 'Manrope', 'Inter', 'Helvetica Neue', sans-serif; font-weight: 700; }
    .h2     { font-family: 'Manrope', 'Inter', 'Helvetica Neue', sans-serif; font-weight: 500; }
    .body   { font-family: 'Manrope', 'Inter', 'Helvetica Neue', sans-serif; font-weight: 400; }
    .body-it{ font-family: 'Manrope', 'Inter', 'Helvetica Neue', sans-serif; font-weight: 400; font-style: italic; }
    .mono   { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
  </style>

  <!-- the brand mark: two L-corner brackets implying a frame -->
  <symbol id="logoMain" viewBox="0 0 60 60">
    <!-- top-left L bracket -->
    <path d="M 6 22 L 6 6 L 22 6"
          fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="square"/>
    <!-- bottom-right L bracket -->
    <path d="M 54 38 L 54 54 L 38 54"
          fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="square"/>
    <!-- single dot offset center — the displaced thing -->
    <circle cx="36" cy="26" r="1.3" fill="currentColor"/>
  </symbol>

  <!-- card mark: just the top-left bracket (the opening) -->
  <symbol id="logoQuestion" viewBox="0 0 32 32">
    <path d="M 4 22 L 4 4 L 22 4"
          fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="square"/>
    <circle cx="14" cy="14" r="1.1" fill="currentColor"/>
  </symbol>

  <!-- card mark: just the bottom-right bracket (the closing) -->
  <symbol id="logoAnswer" viewBox="0 0 32 32">
    <path d="M 28 10 L 28 28 L 10 28"
          fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="square"/>
    <circle cx="18" cy="18" r="1.1" fill="currentColor"/>
  </symbol>
</defs>

<rect width="90" height="90" fill="#FFFFFF"/>
<g color="#1A1A1A">
  <use href="#logoMain" x="20.0" y="14" width="50" height="50"/>
</g>
<text class="h1" x="45.0" y="76" text-anchor="middle"
      font-size="6.8" letter-spacing="-0.2" fill="#1A1A1A">out of context</text>
<text class="mono" x="45.0" y="82" text-anchor="middle"
      font-size="2.4" letter-spacing="2.5" fill="#5A5450">THE IMPLIED FRAME</text>
</svg>